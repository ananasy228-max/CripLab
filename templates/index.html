<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крипто-инструменты (хакерский стиль)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    <!-- Подключаем внешний CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="overlay"></div>

    <div class="container">
        <h1>КРИПТО-ИНСТРУМЕНТЫ (PYTHON + FASTAPI)</h1>

        <!-- Генерация ключа AES -->
        <div class="section">
            <h2>ГЕНЕРАЦИЯ КЛЮЧА AES-256</h2>
            <button onclick="generateKey()">Сгенерировать ключ (base64)</button>
            <div id="keyResult" class="result"></div>
            <div class="note">Ключ 32 байта в формате base64. Сохраните его для шифрования/дешифрования.</div>
        </div>

        <!-- AES-256-CBC Шифрование -->
        <div class="section">
            <h2>AES-256-CBC ШИФРОВАНИЕ</h2>
            <label>Ключ (base64):</label>
            <input type="text" id="aesKeyEncrypt" placeholder="base64 ключ"><br>
            <label>Текст:</label>
            <textarea id="plaintext" placeholder="Текст для шифрования"></textarea><br>
            <button onclick="encryptAES()">Зашифровать</button>
            <div id="encryptResult" class="result"></div>
        </div>

        <!-- AES-256-CBC Дешифрование -->
        <div class="section">
            <h2>AES-256-CBC ДЕШИФРОВАНИЕ</h2>
            <label>Ключ (base64):</label>
            <input type="text" id="aesKeyDecrypt" placeholder="base64 ключ"><br>
            <label>IV (base64):</label>
            <input type="text" id="iv" placeholder="iv base64"><br>
            <label>Шифротекст (base64):</label>
            <textarea id="ciphertext" placeholder="ciphertext base64"></textarea><br>
            <button onclick="decryptAES()">Расшифровать</button>
            <div id="decryptResult" class="result"></div>
        </div>

        <!-- Хэш-функции -->
        <div class="section">
            <h2>ХЭШ-ФУНКЦИИ (SHA‑256 / MD5)</h2>
            <label>Текст:</label>
            <input type="text" id="hashText" placeholder="текст"><br>
            <label>Алгоритм:</label>
            <select id="hashAlgo">
                <option value="sha256">SHA-256</option>
                <option value="md5">MD5</option>
            </select><br>
            <button onclick="computeHash()">Вычислить хэш</button>
            <div id="hashResult" class="result"></div>
        </div>

        <!-- Base64 -->
        <div class="section">
            <h2>BASE64 КОДИРОВАНИЕ/ДЕКОДИРОВАНИЕ</h2>
            <label>Текст:</label>
            <input type="text" id="b64Text" placeholder="текст"><br>
            <label>Действие:</label>
            <select id="b64Action">
                <option value="encode">Кодировать (encode)</option>
                <option value="decode">Декодировать (decode)</option>
            </select><br>
            <button onclick="handleBase64()">Выполнить</button>
            <div id="b64Result" class="result"></div>
        </div>

        <!-- Генерация пароля -->
        <div class="section">
            <h2>ГЕНЕРАЦИЯ КРИПТОСТОЙКОГО ПАРОЛЯ</h2>
            <div class="inline-group">
                <label>Длина:</label>
                <input type="number" id="pwdLength" value="16" min="4" style="width:80px;">
            </div>
            <div class="inline-group">
                <label>Цифры:</label>
                <input type="checkbox" id="pwdDigits" checked>
            </div>
            <div class="inline-group">
                <label>Спецсимволы:</label>
                <input type="checkbox" id="pwdPunct" checked>
            </div>
            <button onclick="generatePassword()">Сгенерировать пароль</button>
            <div id="pwdResult" class="result"></div>
        </div>
    </div>

    <script>
        // --- Матричный фон ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let columns, drops = [];
        const fontSize = 16;
        const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

        function initMatrix() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            columns = Math.floor(width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * -height);
            }
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#2a7a2a';
            ctx.font = fontSize + 'px "Fira Code", "Courier New", monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }

        window.addEventListener('resize', () => {
            initMatrix();
        });

        initMatrix();
        drawMatrix();

        // --- Эффект посимвольного вывода с перебором ---
        function clearScramble(element) {
            if (element._scrambleTimeouts) {
                element._scrambleTimeouts.forEach(clearTimeout);
                element._scrambleTimeouts = [];
            }
        }

        function scrambleReveal(element, finalText, speed = 30) {
            if (!element) return;
            clearScramble(element);

            const chars = '!@#$%^&*()_+{}:"<>?~ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const len = finalText.length;
            let displayed = new Array(len).fill(' ');
            element.textContent = '';

            const timeouts = [];
            element._scrambleTimeouts = timeouts;

            function render() {
                element.textContent = displayed.join('');
            }

            for (let i = 0; i < len; i++) {
                let iterations = 0;
                const maxIter = 6;

                function step() {
                    if (iterations < maxIter) {
                        displayed[i] = chars[Math.floor(Math.random() * chars.length)];
                        render();
                        iterations++;
                        const t = setTimeout(step, speed);
                        timeouts.push(t);
                    } else {
                        displayed[i] = finalText[i];
                        render();
                    }
                }

                const startDelay = i * speed * 2;
                const t = setTimeout(step, startDelay);
                timeouts.push(t);
            }

            const finalTimeout = setTimeout(() => {
                element.textContent = finalText;
                clearScramble(element);
            }, len * speed * 8 + 1000);
            timeouts.push(finalTimeout);
        }

        // --- API взаимодействие ---
        const API_BASE = '/api';

        async function apiPost(endpoint, data) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await response.json();
        }

        function setResult(elementId, text, isError = false) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (isError) {
                clearScramble(el);
                el.innerHTML = `<span class="error">${text}</span>`;
            } else {
                scrambleReveal(el, text);
            }
        }

        async function generateKey() {
            const response = await fetch('/api/generate-key');
            const data = await response.json();
            setResult('keyResult', `Сгенерированный ключ (base64): ${data.key_b64}`);
        }

        async function encryptAES() {
            const key = document.getElementById('aesKeyEncrypt').value.trim();
            const plaintext = document.getElementById('plaintext').value.trim();
            if (!key || !plaintext) {
                alert('Заполните ключ и текст');
                return;
            }
            const data = { key_b64: key, plaintext };
            const result = await apiPost('/aes/encrypt', data);
            if (result.error) {
                setResult('encryptResult', `Ошибка: ${result.error}`, true);
            } else {
                const text = `IV (base64): ${result.iv}\nШифротекст (base64): ${result.ciphertext}`;
                setResult('encryptResult', text);
            }
        }

        async function decryptAES() {
            const key = document.getElementById('aesKeyDecrypt').value.trim();
            const iv = document.getElementById('iv').value.trim();
            const ct = document.getElementById('ciphertext').value.trim();
            if (!key || !iv || !ct) {
                alert('Заполните ключ, IV и шифротекст');
                return;
            }
            const data = { key_b64: key, iv_b64: iv, ciphertext_b64: ct };
            const result = await apiPost('/aes/decrypt', data);
            if (result.error) {
                setResult('decryptResult', `Ошибка: ${result.error}`, true);
            } else {
                setResult('decryptResult', `Расшифровано: ${result.plaintext}`);
            }
        }

        async function computeHash() {
            const text = document.getElementById('hashText').value.trim();
            const algo = document.getElementById('hashAlgo').value;
            if (!text) {
                alert('Введите текст');
                return;
            }
            const data = { text, algorithm: algo };
            const result = await apiPost('/hash', data);
            if (result.error) {
                setResult('hashResult', `Ошибка: ${result.error}`, true);
            } else {
                setResult('hashResult', `${algo.toUpperCase()}: ${result.hash}`);
            }
        }

        async function handleBase64() {
            const text = document.getElementById('b64Text').value.trim();
            const action = document.getElementById('b64Action').value;
            if (!text) {
                alert('Введите текст');
                return;
            }
            const data = { text, action };
            const result = await apiPost('/base64', data);
            if (result.error) {
                setResult('b64Result', `Ошибка: ${result.error}`, true);
            } else {
                setResult('b64Result', `Результат: ${result.result}`);
            }
        }

        async function generatePassword() {
            const length = parseInt(document.getElementById('pwdLength').value, 10);
            const useDigits = document.getElementById('pwdDigits').checked;
            const usePunct = document.getElementById('pwdPunct').checked;
            const data = { length, use_digits: useDigits, use_punctuation: usePunct };
            const result = await apiPost('/generate-password', data);
            if (result.error) {
                setResult('pwdResult', `Ошибка: ${result.error}`, true);
            } else {
                setResult('pwdResult', `Пароль: ${result.password}`);
            }
        }
    </script>
</body>
</html>
